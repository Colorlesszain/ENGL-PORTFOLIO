<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video | Damion's English Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== Global ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg,#1e1e2f,#2c2c54);
    color:white;
}

/* ===== Navbar (MATCHES YOUR OTHER PAGES) ===== */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);
}

nav h1 {
    font-size: 1.5rem;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li {
    transition: 0.3s;
}

nav ul li:hover {
    color: #00d4ff;
}

nav a {
    text-decoration: none;
    color: white;
}

nav a:hover {
    color: #00d4ff;
}

/* ===== Video Section ===== */
.video-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
    padding:20px;
}

/* Responsive YouTube Video */
.video-container iframe{
    width: 80%;
    max-width: 900px;
    aspect-ratio: 16 / 9;
    border: none;
    border-radius: 15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <h1>Damion's English Portfolio</h1>
    <ul>
        <li><a href="index.html">About Me</a></li>
        <li><a href="gallery.html">Artifacts</a></li>
        <li><a href="video.html">Video</a></li>
    </ul>
</nav>

<!-- Centered Video -->
<div class="video-container">
    <iframe 
        src="https://www.youtube.com/embed/9EX1hdFzOLU"
        title="YouTube video player"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
