<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video | Damion's English Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* Global */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg,#1e1e2f,#2c2c54);
    color:white;
}

/* Navbar */
/* Navbar */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(10px);
}

nav h1 {
    font-size: 1.5rem;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
}

nav ul li {
    cursor: pointer;
    transition: 0.3s;
}

nav ul li:hover {
    color: #00d4ff;
}

nav a {
    text-decoration: none;
    color: white;
}

nav a:hover {
    color: #00d4ff;
}
/* Center video */
.video-container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

/* Video styling */
video{
    width:70%;
    max-width:900px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<nav>
    <h1>Damion's English Portfolio</h1>
    <ul>
        <li><a href="./index.html">About Me</a></li>
        <li><a href="./gallery.html">Artifacts</a></li>
        <iframe width="560" height="315" 
        src="https://www.youtube.com/embed/9EX1hdFzOLU?si=JeyWHi2419j546Xl" title="YouTube video player" 
        frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </ul>
</nav>

<div class="video-container">

    <!-- LOCAL VIDEO -->
    <video controls>
        <source src="myvideo.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

</div>

</body>
</html>
